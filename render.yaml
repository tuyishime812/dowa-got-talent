services:
  - type: web
    name: dgt-sounds
    env: node
    buildCommand: npm run build
    startCommand: npx serve -s dist -p ${PORT:-5173}
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SITE_URL
        sync: false
