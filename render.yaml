services:
  # Web Service for the React app
  - type: web
    name: dgt-sounds
    region: oregon
    plan: free
    env: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SITE_URL
        sync: false
